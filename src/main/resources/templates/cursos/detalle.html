<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Curso | EduManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center">
            <h2 th:text="${'Curso: ' + curso.nombre}">Detalle del Curso</h2>
            <a th:href="@{/cursos}" class="btn btn-outline-secondary btn-sm">← Volver a Cursos</a>
        </div>
        <hr>

        <div class="card shadow-sm mt-4">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Alumnos Inscritos y Calificaciones</h4>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Nombre del Alumno</th>
                            <th>Notas Actuales</th>
                            <th sec:authorize="hasRole('ADMIN')">Acción</th>
                        </tr>
                    </thead>
                 <tbody>
				    <tr th:if="${#lists.isEmpty(curso.usuarios)}">
				        <td colspan="3" class="text-center text-muted py-4">
				            No hay alumnos inscritos en este curso todavía.
				        </td>
				    </tr>
				    
				    <tr th:each="usuario : ${curso.usuarios}" 
				        th:if="${#authorization.expression('hasRole(''ADMIN'')') or usuario.email == #authentication.name}">
				        
				  <td th:text="${usuario.estudiante?.nombre != null ? usuario.estudiante.nombre + ' ' + usuario.estudiante.apellido : 'Sin datos personales'}"></td>

<td>
    <th:block th:if="${usuario.estudiante != null}">
        <span th:each="nota : ${usuario.estudiante.notas}" 
              th:if="${nota.curso.id == curso.id}" 
              class="badge bg-info text-dark me-1" 
              th:text="${nota.valor}"></span>
    </th:block>
</td>

<td sec:authorize="hasRole('ADMIN')">
    <form th:if="${usuario.estudiante != null}" th:action="@{/notas/guardar}" method="post" class="d-flex gap-2">
        <input type="hidden" name="cursoId" th:value="${curso.id}">
        <input type="hidden" name="estudianteId" th:value="${usuario.estudiante.id}">
        <input type="number" step="0.1" name="valor" class="form-control form-control-sm" style="width: 80px;" placeholder="0.0" required>
        <button type="submit" class="btn btn-success btn-sm">Cargar</button>
    </form>
    <span th:unless="${usuario.estudiante != null}" class="text-muted small">No es estudiante</span>
</td>
				    </tr>
				</tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

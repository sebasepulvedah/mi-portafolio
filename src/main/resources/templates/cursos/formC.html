<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Gestionar Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .form-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card shadow-sm p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary" th:text="${titulo}">Formulario de Curso</h2>
                        <p class="text-muted small">Completa la información del curso a continuación</p>
                    </div>

                    <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre del Curso</label>
                            <input type="text" th:field="*{nombre}" id="nombre" 
                                   class="form-control" placeholder="Ej: Java Spring Boot"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea th:field="*{descripcion}" id="descripcion" 
                                      class="form-control" rows="4" 
                                      placeholder="Describe los objetivos del curso..."
                                      th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''" required></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                <span th:text="${curso.id == null ? 'Crear Curso' : 'Actualizar Curso'}">Guardar</span>
                            </button>
                            <a th:href="@{/cursos}" class="btn btn-link text-secondary text-decoration-none small mt-2">
                                ← Cancelar y volver
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Mis Cursos - EduManager</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	background-color: #f8f9fa;
}

.card {
	border-radius: 15px;
}

.table-hover tbody tr:hover {
	background-color: #f1f4f9;
}
</style>
</head>
<body>

	<div th:replace="~{layout :: navbar}"></div>

	<div class="container mt-4">
		<div class="row">
			<div class="col-12">

				<div class="d-flex justify-content-between align-items-center mb-4">
					<h2 class="fw-bold text-dark">Mis Cursos</h2>
					<div>
						<a th:href="@{/cursos/disponibles}"
							class="btn btn-outline-primary me-2"> Ver Catálogo </a> <a
							sec:authorize="hasRole('ADMIN')" th:href="@{/cursos/nuevo}"
							class="btn btn-success"> + Crear Nuevo Curso </a>
					</div>
				</div>

				<div class="card shadow-sm border-0">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
									<tr>
										<th class="ps-4">ID</th>
										<th>Nombre del Curso</th>
										<th>Descripción</th>
										<th class="text-center">Acciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="curso : ${cursos}">
										<td class="ps-4 text-muted" th:text="${curso.id}"></td>
										<td><span class="fw-bold text-primary"
											th:text="${curso.nombre}"></span></td>
										<td class="text-muted small" th:text="${curso.descripcion}"></td>
										<td class="text-center">
											<div class="btn-group" role="group">
												<a th:href="@{/cursos/detalle/{id}(id=${curso.id})}"
													class="btn btn-sm btn-outline-primary">Ver</a> <a
													sec:authorize="hasRole('ADMIN')"
													th:href="@{/cursos/editar/{id}(id=${curso.id})}"
													class="btn btn-sm btn-outline-warning">Editar</a> <a
													sec:authorize="hasRole('ADMIN')"
													th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
													class="btn btn-sm btn-outline-danger"
													onclick="return confirm('¿Estás seguro?')">Eliminar</a>
											</div>
										</td>
									</tr>

									<tr th:if="${#lists.isEmpty(cursos)}">
										<td colspan="4" class="text-center py-5 text-muted">No
											tienes cursos registrados actualmente.</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>

				<div class="mt-4">
					<a th:href="@{/home}"
						class="text-decoration-none text-secondary small"> ← Volver al
						Panel de Inicio </a>
				</div>

			</div>
		</div>
	</div>

	<div th:replace="~{layout :: footer}"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

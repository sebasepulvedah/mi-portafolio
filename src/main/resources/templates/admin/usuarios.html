<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | EduManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Usuarios Registrados</h3>
            </div>
            <div class="card-body">
					             <table class="table table-hover mt-3">
					    <thead class="table-light">
					        <tr>
					            <th>ID</th>
					            <th>Username</th>
					            <th>Email</th>
					            <th>Rol</th>
					            <th>Acciones</th> </tr>
					    </thead>
								    <tbody>
			        <tr th:each="user : ${usuarios}">
			            <td th:text="${user.id}"></td>
			            <td th:text="${user.username}"></td>
			            <td th:text="${user.email}"></td>
			            <td>
			                <span class="badge bg-info text-dark" th:text="${user.role}"></span>
			            </td>
			            <td>
			                <a th:href="@{/admin/usuarios/editar/{id}(id=${user.id})}" 
			                   class="btn btn-sm btn-warning">Editar</a>
			                
			                <a th:href="@{/admin/usuarios/eliminar/{id}(id=${user.id})}" 
			                   class="btn btn-sm btn-danger" 
			                   onclick="return confirm('¿Estás seguro de eliminar este usuario?')">Eliminar</a>
			            </td>
			        </tr>
			    </tbody>
			</table>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>

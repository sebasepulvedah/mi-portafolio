<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - EduManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-profile { border-radius: 15px; border: none; max-width: 600px; margin: auto; }
        .profile-icon { font-size: 3rem; color: #0d6efd; }
    </style>
</head>
<body>

    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <div class="card card-profile shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="profile-icon mb-2">👤</div>
                    <h2 class="fw-bold">Mi Perfil</h2>
                    <p class="text-muted">Gestiona tu información personal</p>
                </div>

<form th:action="@{/usuario/actualizar}" th:object="${usuario}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">Nombre de Usuario (Login)</label>
        <input type="text" th:field="*{username}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Nombre Real</label>
            <input type="text" name="nombre" th:value="${usuario.estudiante?.nombre}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" th:value="${usuario.estudiante?.apellido}" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">DNI / RUN</label>
        <input type="text" name="dni" th:value="${usuario.estudiante?.dni}" class="form-control" required>
    </div>

    <hr class="my-4">

    <div class="mb-4">
        <label class="form-label">Nueva Contraseña (dejar en blanco para no cambiar)</label>
        <input type="password" name="nuevaPassword" class="form-control" placeholder="********">
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
            💾 Guardar Cambios
        </button>
        <a th:href="@{/home}" class="btn btn-light">Cancelar</a>
    </div>
</form>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

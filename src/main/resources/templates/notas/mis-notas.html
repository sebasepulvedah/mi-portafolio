<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Calificaciones | EduManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4">📋 Mis Calificaciones</h2>
        
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Curso</th>
                            <th>Calificaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                       <tr th:each="curso : ${estudiante.usuario.cursos}"> 
					    <td class="fw-bold" th:text="${curso.nombre}">Nombre del Curso</td>
					    <td>
					        <span th:each="nota : ${estudiante.notas}" 
					              th:if="${nota.curso.id == curso.id}" 
					              class="badge bg-primary me-1" 
					              th:text="${nota.valor}"></span>
					              
					        <span th:if="${#lists.isEmpty(estudiante.notas)}" class="text-muted small">
					            Sin notas registradas
					        </span>
					    </td>
					</tr>
                        <tr th:if="${#lists.isEmpty(estudiante.usuario.cursos)}">
                            <td colspan="2" class="text-center py-4 text-muted">
                                No estás inscrito en ningún curso.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
